<title>NYC opportunity sites</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

<style>
  :root {
    --vc-black: #050507;
    --vc-cloud: #dddddd;
    --vc-charcoal: #707175;
    --vc-charcoal-50: #b9b9ba;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body {
    font-family: "halyard-text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 300;
    color: var(--vc-black);
    -webkit-font-smoothing: antialiased;
  }

  .vc-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 20px 12px;
  }

  .vc-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    align-items: center;
    margin: 0 0 12px;
    font-size: 13px;
    color: var(--vc-black);
  }
  .vc-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-weight: 300;
  }
  .vc-legend-swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .vc-legend-divider {
    width: 1px; height: 18px;
    background: var(--vc-cloud);
  }
  .vc-legend-sizes {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--vc-charcoal);
  }
  .vc-size-pair {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .vc-size-dot {
    border-radius: 50%;
    background: var(--vc-charcoal-50);
    opacity: 0.7;
    display: inline-block;
    flex-shrink: 0;
  }
  .vc-legend-label {
    font-weight: 700;
    color: var(--vc-charcoal);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-size: 11px;
    margin-right: 4px;
  }

  #map {
    width: 100%;
    height: 720px;
    background: #f1f0ec;
    border: 1px solid var(--vc-cloud);
  }
  .leaflet-container {
    font-family: "halyard-text", sans-serif;
    background: #f1f0ec;
  }

  /* Popups */
  .leaflet-popup-content-wrapper {
    border-radius: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    border: 1px solid var(--vc-cloud);
  }
  .leaflet-popup-content {
    margin: 12px 14px;
    font-size: 13px;
    line-height: 1.4;
    color: var(--vc-black);
    font-weight: 300;
  }
  .leaflet-popup-tip {
    background: #ffffff;
    border: 1px solid var(--vc-cloud);
  }
  .vc-popup-agency {
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }
  .vc-popup-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
    color: var(--vc-black);
  }
  .vc-popup-meta {
    color: var(--vc-charcoal);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .vc-popup-units {
    font-weight: 700;
    color: var(--vc-black);
    font-size: 13px;
  }
  .vc-popup-units-num {
    font-size: 18px;
    font-weight: 900;
  }

  @media (max-width: 640px) {
    .vc-container { padding: 12px 12px; }
    #map { height: 540px; }
    .vc-legend { gap: 8px 16px; font-size: 12px; }
  }

  .leaflet-control-attribution {
    font-size: 10px !important;
    background: rgba(255,255,255,0.85) !important;
    font-family: "halyard-text", sans-serif !important;
  }
</style>
</head>

  const AGENCY_META = {

    "Libraries": { label: "Libraries",      color: "#e7466d" },
    "NYPD":      { label: "Police (NYPD)",  color: "#ff7c53" },
    "FIRE":      { label: "Fire (FDNY)",    color: "#217ebe" }
  };

  const map = L.map('map', {
    center: [40.715, -73.96],
    zoom: 11,
    minZoom: 10,
    maxZoom: 16,
    zoomControl: true,
    attributionControl: true,

  });
  map.on('focus', function() { map.scrollWheelZoom.enable(); });
  map.on('blur',  function() { map.scrollWheelZoom.disable(); });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {

    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    pane: 'shadowPane',
    opacity: 0.85
  }).addTo(map);

  function radiusForUnits(u) {
    if (!u || u <= 0) return 2.5;
    return Math.max(2.5, Math.min(16, 2 + Math.sqrt(u) * 0.9));
  }

  const fmt = n => n.toLocaleString('en-US', { maximumFractionDigits: 1 });
  const BORO = { BK: "Brooklyn", BX: "Bronx", MN: "Manhattan", QN: "Queens", SI: "Staten Island" };

  PARCELS.forEach(function(p) {
    const meta = AGENCY_META[p.a];
    const r = radiusForUnits(p.u);

    const marker = L.circleMarker([p.lat, p.lng], {
      radius: r,
      fillColor: meta.color,
      color: "#050507",
      weight: 0.5,
      opacity: 0.9,
      fillOpacity: 0.78
    }).addTo(map);

    const html =
      '<div class="vc-popup-agency" style="color:' + meta.color + '">' + meta.label + '</div>' +
      '<div class="vc-popup-name">' + (p.n && p.n !== 'nan' ? p.n : 'Unnamed parcel') + '</div>' +
      '<div class="vc-popup-meta">' +
        (p.ad && p.ad !== 'nan' ? p.ad + '<br>' : '') +
        (BORO[p.b] || p.b) +
        (p.ut && p.ut !== 'nan' ? ' &middot; ' + p.ut.toLowerCase() : '') +
      '</div>' +
      '<div class="vc-popup-units"><span class="vc-popup-units-num">' + fmt(p.u) + '</span> potential units</div>';

    marker.bindPopup(html, { closeButton: true, autoPan: true, maxWidth: 280 });

    marker.on('mouseover', function() {
      this.setStyle({ weight: 1.5, fillOpacity: 0.95 });
      this.bringToFront();
    });
    marker.on('mouseout', function() {
      this.setStyle({ weight: 0.5, fillOpacity: 0.78 });
    });
  });

  map.fitBounds([[40.495, -74.26], [40.92, -73.70]]);
